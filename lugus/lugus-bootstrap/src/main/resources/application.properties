# -------------------------------------------------
#  COMMON SETTINGS (apply to every profile)
# -------------------------------------------------
spring.profiles.active=@active.profile@  

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:lugus}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.security=WARN

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

server.port=8090
server.servlet.context-path=/lugus

# Password recovery mail (disabled by default)
lugus.recovery.mail.enabled=false
lugus.recovery.mail.from=no-reply@lugus.local
lugus.recovery.mail.subject=Recuperacion de contraseña

# Observability
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=when_authorized
lugus.observability.correlation-id.header=X-Correlation-Id

# Login debug: show authentication exception detail on login page
lugus.security.login.show-exception=false

# -------------------------------------------------
#  DEV PROFILE (activate with -Dspring.profiles.active=dev)
# -------------------------------------------------

logging.level.org.springframework=WARN
# Connection‑pool tuning (optional)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
