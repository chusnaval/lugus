<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Listado de películas</title>
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
	crossorigin="anonymous"></script>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet" crossorigin="anonymous">
	
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
	crossorigin="anonymous" referrerpolicy="no-referrer" />
	
<link th:href="@{/css/lugus.css}" rel="stylesheet">
<link th:href="@{/css/botones.css}" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/menu.css}">
</head>
<body class="p-4">
	
	<div th:replace="~{layout/header :: header}"></div>
	<h3>Películas</h3>
	<div th:replace="~{layout/filters :: filters}"></div>
	
	<div class="container-fluid">
		<div class="row justify-content-center g-4">
			<div th:each="p, iStat : ${pagePeliculas.content}"
				id="tabla-peliculas"
				 class="film col-12 col-sm-6 col-md-3 col-lg-2 card-borde ms-1">

				<div class="card card-bg h-100 position-relative">

				<a th:href="@{/peliculas/{id}(id=${p.id})}"	class="stretched-link"></a>

				<div class="card-body p-2">

					<div class="image-wrapper mb-2">
						<img th:if="${p.tieneCaratula == false}" src="image/placeholder.png"
							class="card-img-top fixed" th:alt="${p.notas}" /> 
						<img th:if="${p.tieneCaratula == true}"
							th:src="@{/peliculas/{id}/image(id=${p.id})}"
							class="card-img-top fixed" th:alt="${p.notas}" />

						<div th:class="${p.comprado ? 'overlay' : 'overlay unavailable'}">No
							Disponible</div>
					</div>			
						
					<h5 class="title fw-bold mb-1" th:text="${p.titulo}"></h5>

					<div class="info-line d-flex justify-content-between">
						<span th:text="${p.anyo}"></span>
						<span th:text="${p.formato}"></span>
					</div>
							
					<div class="info-line">
						<img th:src="@{/image/IMDb_Logo.png}" class="imdb_logo_list" alt="IMDb Rating">
						<span  th:text="${p.ratingFormatted}"></span>
					</div>
							
							
					<div class="info-line">
						<span th:text="${p.location==null?'':p.location}"></span>
					</div>

					<!-- Estrella de favorito -->
					<button sec:authorize="isAuthenticated()" class="favorite-toggle position-absolute top-0 end-0 p-2" data-pelicula-id="${p.id}">	
						<i class="fa-star fa-lg fa" th:classappend="${p.favorita} ? 'fas' : 'far'"></i>
					</button>

				</div>
				
				<div class="card-footer bg-transparent border-0 p-2">
					<a
						th:href="@{/peliculas/editar/{id}(id=${p.id})}"
						 sec:authorize="hasRole('ROLE_ADMIN')" class="btn btn-sm btn-lumo">Editar</a>
				</div>
			</div>
		</div>
	</div>

	<hr />

	<nav aria-label="Pagination" th:if="${pagePeliculas.totalPages > 0}">
		<ul class="pagination justify-content-center">
			<li class="page-item"
				th:classappend="${pagePeliculas.number == 0} ? 'disabled'"><a
				th:replace="~{layout/paging :: paging('/peliculas?recuperar=true&pagina=', 0, '<<', 'Primera Página')}"></a>
			</li>

			<li class="page-item font-weight-bold"
				th:classappend="${pagePeliculas.number == 0} ? 'disabled'"><a
				th:replace="~{layout/paging :: paging('/peliculas?recuperar=true&pagina=', ${pagePeliculas.number - 1}, 'Anterior', 'Página Anterior')}"></a>
			</li>

			<li class="page-item disabled"
				th:if="${pagePeliculas.number - 2 > 1}"><a class="page-link"
				href="#">...</a></li>

			<li class="page-item"
				th:classappend="${page == pagePeliculas.number+1} ? 'active'"
				th:each="page : ${#numbers.sequence(pagePeliculas.number > 2 ? pagePeliculas.number - 2 : 1, pagePeliculas.number + 2 < pagePeliculas.totalPages ? pagePeliculas.number + 2 : pagePeliculas.totalPages)}">
				<a
				th:replace="~{layout/paging :: paging('/peliculas?recuperar=true&pagina=', ${page}-1, ${page}, 'Página ' + ${page})}"></a>
			</li>

			<li class="page-item disabled"
				th:if="${pagePeliculas.number + 2 < pagePeliculas.totalPages}"><a
				class="page-link" href="#">...</a></li>

			<li class="page-item font-weight-bold"
				th:classappend="${pagePeliculas.number == pagePeliculas.totalPages} ? 'disabled'"><a
				th:replace="~{layout/paging :: paging('/peliculas?recuperar=true&pagina=', ${pagePeliculas.number+1},'Siguiente', 'Página Siguiente')}"></a>
			</li>

			<li class="page-item"
				th:classappend="${pagePeliculas.number == pagePeliculas.totalPages} ? 'disabled'"><a
				th:replace="~{layout/paging :: paging('/peliculas?recuperar=true&pagina=', ${pagePeliculas.totalPages}, '>>', 'Última Página')}"></a>
			</li>

		</ul>
	</nav>

</body>
</html>

<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.favorite-toggle').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const peliculaId = btn.getAttribute('data-pelicula-id');
            const icon = btn.querySelector('i');
            const isFavorite = icon.classList.contains('fas');
            const url = '/api/favoritos/pelicula/' + peliculaId;
            btn.classList.add('disabled');
            fetch(url, {
                method: isFavorite ? 'DELETE' : 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'Content-Type': 'application/json'
                },
                credentials: 'same-origin'
            })
            .then(response => {
                if (response.ok) {
                    icon.classList.toggle('fas');
                    icon.classList.toggle('far');
                    btn.classList.toggle('text-warning');
                    btn.classList.toggle('text-secondary');
                } else {
                    alert('Error al actualizar favorito');
                }
            })
            .catch(() => alert('Error de red'))
            .finally(() => btn.classList.remove('disabled'));
        });
    });
});
</script>
