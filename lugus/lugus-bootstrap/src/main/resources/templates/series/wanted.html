<!DOCTYPE html>
<html lang="es" xml:lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Series Buscadas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
<link rel="stylesheet" th:href="@{/css/lugus.css}" rel="stylesheet">
</head>
<body class="container mt-4">
	<div th:replace="~{layout/header :: header}"></div>
	<h2>Series Buscadas</h2>
	<div class="mb-3">
		<a class="btn btn-outline-primary me-2" th:href="@{/series/wanted/export?format=md}">Exportar a Markdown</a>
		<a class="btn btn-outline-success me-2" th:href="@{/series/wanted/export?format=ods}">Exportar a ODS</a>
		<a class="btn btn-outline-danger" th:href="@{/series/wanted/export?format=pdf}">Exportar a PDF</a>
	</div>
	<table class="table table-striped">
		<thead>
			<tr>
				<th>Título</th>
				<th>Año Inicio</th>
				<th>Temporada</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="ser : ${wantedList}">
				<td th:text="${ser.titulo}"></td>
				<td th:text="${ser.anyoInicio}"></td>
				<td th:text="${ser.seasonDesc}"></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
